<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КУРГАНМАШЗАВОД - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Roboto', sans-serif; }
        
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: #1a1a1a;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .login-card h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }
        .login-card .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 13px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333;
            font-size: 14px;
            background: #2a2a2a;
            color: white;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #ff3333;
            background: #333;
        }
        input::placeholder { color: #666; }
        
        button {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #ff3333; color: white; }
        
        .error {
            background: rgba(255,51,51,0.2);
            color: #ff6666;
            padding: 10px;
            margin-top: 15px;
            text-align: center;
            display: none;
            border: 1px solid #ff3333;
        }
        .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
        .demo-info strong { color: #ff6666; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>КУРГАНМАШЗАВОД</h1>
            <p>Система управления графиком смен</p>
        </div>
        <h2>Вход в систему</h2>
        <div class="subtitle">Введите учетные данные</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Логин</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit">Войти</button>
        </form>
        <div id="error" class="error"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'admin') window.location.href = '/admin.html';
                    else window.location.href = '/worker.html';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
