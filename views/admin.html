<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>КУРГАНМАШЗАВОД - Администратор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; padding: 20px; }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            background: #1a1a1a;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #333;
        }
        .header h1 {
            color: #ffffff;
            font-size: 24px;
            letter-spacing: 1px;
        }
        .header p {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
            background: #2a2a2a;
            padding: 8px 20px;
            color: #ccc;
        }
        .logout-btn {
            background: #ff3333;
            border: none;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background: #cc0000; }
        
        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1a1a1a;
            flex: 1;
            min-width: 150px;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff3333;
            border: 1px solid #333;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
        }
        .stat-label {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .dashboard {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }
        .form-panel {
            flex: 1;
            min-width: 280px;
            background: #1a1a1a;
            padding: 25px;
            border: 1px solid #333;
        }
        .table-panel {
            flex: 2;
            min-width: 400px;
            background: #1a1a1a;
            padding: 25px;
            border: 1px solid #333;
        }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            border-left: 4px solid #ff3333;
            padding-left: 12px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            font-weight: 600;
            color: #ccc;
            margin-bottom: 5px;
            font-size: 12px;
        }
        input, select {
            width: 100%;
            padding: 10px 15px;
            margin: 5px 0;
            border: 1px solid #333;
            font-size: 14px;
            background: #2a2a2a;
            color: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff3333;
        }
        
        button {
            width: 100%;
            padding: 10px 15px;
            margin: 5px 0;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: white;
            color: black;
            border: none;
        }
        .btn-primary:hover { background: #ff3333; color: white; }
        
        .btn-outline {
            background: transparent;
            color: white;
            border: 1px solid white;
        }
        .btn-outline:hover { background: white; color: black; }
        
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-bar input, .filter-bar select {
            width: auto;
            flex: 1;
        }
        .filter-bar button {
            width: auto;
            padding: 10px 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2a2a2a;
            color: #ffffff;
            font-weight: 700;
        }
        td { color: #ccc; }
        
        .shift-badge {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
        }
        .shift-День { background: #fde68a; color: #6b4c0a; }
        .shift-Ночь { background: #cbd5e6; color: #1e293b; }
        .shift-Вечер { background: #bbdef5; color: #0c4a6e; }
        .shift-Выходной { background: #e9ecef; color: #4b5563; }
        
        .action-icons { display: flex; gap: 8px; }
        .edit-btn {
            background: transparent;
            border: 1px solid white;
            padding: 4px 12px;
            cursor: pointer;
            width: auto;
            margin: 0;
            color: white;
        }
        .edit-btn:hover { background: white; color: black; }
        
        .delete-btn {
            background: #ff3333;
            border: none;
            padding: 4px 12px;
            cursor: pointer;
            width: auto;
            margin: 0;
            color: white;
        }
        .delete-btn:hover { background: #cc0000; }
        
        footer {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 11px;
        }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 1024px) {
            .dashboard { gap: 20px; }
            .form-panel { min-width: 260px; }
            .table-panel { min-width: 360px; }
        }

        @media (max-width: 768px) {
            body { padding: 15px; }
            .header { padding: 15px 20px; flex-direction: column; text-align: center; gap: 12px; }
            .header h1 { font-size: 22px; }
            .stats-grid { gap: 15px; }
            .stat-card { min-width: calc(50% - 15px); padding: 15px; }
            .stat-number { font-size: 28px; }
            .dashboard { flex-direction: column; }
            .form-panel, .table-panel { min-width: auto; padding: 20px; }
            .filter-bar { flex-direction: column; }
            .filter-bar input, .filter-bar select, .filter-bar button { width: 100%; }
            .section-title { font-size: 16px; }
            th, td { padding: 10px 8px; font-size: 12px; }
            .action-icons { gap: 6px; }
            .edit-btn, .delete-btn { padding: 4px 10px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .header { padding: 12px 15px; margin-bottom: 20px; }
            .header h1 { font-size: 18px; }
            .header p { font-size: 10px; }
            .user-info { padding: 6px 12px; gap: 10px; }
            .user-info span { font-size: 12px; }
            .logout-btn { padding: 4px 12px; font-size: 12px; }
            .stats-grid { gap: 10px; margin-bottom: 20px; }
            .stat-card { min-width: 100%; padding: 12px; }
            .stat-number { font-size: 24px; }
            .stat-label { font-size: 10px; }
            .form-panel, .table-panel { padding: 15px; }
            .section-title { font-size: 14px; margin-bottom: 15px; }
            .form-group { margin-bottom: 12px; }
            label { font-size: 11px; }
            input, select { padding: 8px 12px; font-size: 13px; }
            button { padding: 8px 12px; font-size: 13px; }
            th, td { padding: 8px 6px; font-size: 11px; }
            .shift-badge { padding: 2px 8px; font-size: 9px; }
            .action-icons { flex-direction: column; gap: 4px; }
            .edit-btn, .delete-btn { width: 100%; text-align: center; }
            footer { font-size: 9px; margin-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>КУРГАНМАШЗАВОД</h1>
                <p>Панель администратора — управление графиком смен</p>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalShifts">0</div><div class="stat-label">Всего смен</div></div>
            <div class="stat-card"><div class="stat-number" id="dayShifts">0</div><div class="stat-label">Дневные</div></div>
            <div class="stat-card"><div class="stat-number" id="nightShifts">0</div><div class="stat-label">Ночные</div></div>
            <div class="stat-card"><div class="stat-number" id="eveningShifts">0</div><div class="stat-label">Вечерние</div></div>
        </div>

        <div class="dashboard">
            <div class="form-panel">
                <div class="section-title">📋 Управление сменами</div>
                <form id="shiftForm">
                    <div class="form-group">
                        <label>👤 ФИО сотрудника</label>
                        <input type="text" id="employeeName" required>
                    </div>
                    <div class="form-group">
                        <label>🏭 Цех</label>
                        <input type="text" id="workshop" required>
                    </div>
                    <div class="form-group">
                        <label>📅 Дата смены</label>
                        <input type="date" id="shiftDate" required>
                    </div>
                    <div class="form-group">
                        <label>⏳ Тип смены</label>
                        <select id="shiftType">
                            <option value="День">День (08:00-20:00)</option>
                            <option value="Ночь">Ночь (20:00-08:00)</option>
                            <option value="Вечер">Вечер (14:00-22:00)</option>
                            <option value="Выходной">Выходной</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📝 Примечание</label>
                        <input type="text" id="note" placeholder="опционально">
                    </div>
                    <input type="hidden" id="editId">
                    <button type="submit" id="submitBtn" class="btn-primary">Добавить смену</button>
                    <button type="button" id="cancelBtn" class="btn-outline">Отмена</button>
                </form>
            </div>

            <div class="table-panel">
                <div class="section-title"> График смен</div>
                <div class="filter-bar">
                    <input type="text" id="filterWorkshop" placeholder="Фильтр по цеху">
                    <select id="filterType">
                        <option value="all">Все смены</option>
                        <option value="День">Дневные</option>
                        <option value="Ночь">Ночные</option>
                        <option value="Вечер">Вечерние</option>
                    </select>
                    <button id="resetFilters" class="btn-outline">Сброс</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Сотрудник</th><th>Цех</th><th>Дата</th><th>Смена</th><th>Примечание</th><th>Действия</th></tr>
                        </thead>
                        <tbody id="tableBody"><tr><td colspan="7">Загрузка......</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer>© 2026 АО «Курганмашзавод» — Система управления графиком смен</footer>
    </div>

    <script>
        let token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const user = JSON.parse(localStorage.getItem('user'));
        if (user.role !== 'admin') window.location.href = '/worker.html';
        document.getElementById('userName').innerHTML = `${user.fullname}`;

        async function apiRequest(endpoint, options = {}) {
            const res = await fetch(`/api/shifts${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...options.headers }
            });
            if (res.status === 401) logout();
            return res.json();
        }

        async function loadData() {
            let shifts = await apiRequest('');
            const workshop = document.getElementById('filterWorkshop').value;
            const type = document.getElementById('filterType').value;
            if (workshop) shifts = shifts.filter(s => s.workshop.toLowerCase().includes(workshop.toLowerCase()));
            if (type !== 'all') shifts = shifts.filter(s => s.shift_type === type);
            const stats = await apiRequest('/stats');
            renderTable(shifts);
            updateStats(stats);
        }

        function renderTable(shifts) {
            const tbody = document.getElementById('tableBody');
            if (!shifts.length) { tbody.innerHTML = '<tr><td colspan="7">Нет данных</td></tr>'; return; }
            tbody.innerHTML = shifts.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td><strong>${escapeHtml(s.employee_name)}</strong></td>
                    <td>${escapeHtml(s.workshop)}</td>
                    <td>${s.shift_date}</td>
                    <td><span class="shift-badge shift-${s.shift_type}">${s.shift_type}</span></td>
                    <td>${escapeHtml(s.note) || '—'}</td>
                    <td class="action-icons">
                        <button class="edit-btn" onclick="editShift(${s.id})">✏️</button>
                        <button class="delete-btn" onclick="deleteShift(${s.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(stats) {
            document.getElementById('totalShifts').innerText = stats.total || 0;
            document.getElementById('dayShifts').innerText = stats.day || 0;
            document.getElementById('nightShifts').innerText = stats.night || 0;
            document.getElementById('eveningShifts').innerText = stats.evening || 0;
        }

        async function deleteShift(id) {
            if (confirm('Удалить смену?')) {
                await fetch(`/api/shifts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadData();
            }
        }

        async function editShift(id) {
            const res = await fetch(`/api/shifts/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const s = await res.json();
            document.getElementById('employeeName').value = s.employee_name;
            document.getElementById('workshop').value = s.workshop;
            document.getElementById('shiftDate').value = s.shift_date;
            document.getElementById('shiftType').value = s.shift_type;
            document.getElementById('note').value = s.note || '';
            document.getElementById('editId').value = s.id;
            document.getElementById('submitBtn').innerHTML = '✏️ Обновить смену';
        }

        document.getElementById('shiftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                employee_name: document.getElementById('employeeName').value,
                workshop: document.getElementById('workshop').value,
                shift_date: document.getElementById('shiftDate').value,
                shift_type: document.getElementById('shiftType').value,
                note: document.getElementById('note').value
            };
            const editId = document.getElementById('editId').value;
            const url = editId ? `/api/shifts/${editId}` : '/api/shifts';
            const method = editId ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
            document.getElementById('shiftForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('submitBtn').innerHTML = '➕ Добавить смену';
            loadData();
        });

        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('shiftForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('submitBtn').innerHTML = '➕ Добавить смену';
        });
        document.getElementById('resetFilters').addEventListener('click', () => {
            document.getElementById('filterWorkshop').value = '';
            document.getElementById('filterType').value = 'all';
            loadData();
        });
        document.getElementById('filterWorkshop').addEventListener('input', () => loadData());
        document.getElementById('filterType').addEventListener('change', () => loadData());

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        function logout() { localStorage.clear(); window.location.href = '/login.html'; }

        loadData();
    </script>
</body>
</html>
